
name: Deploy React Site via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build project (Compile and Bundle)
        run: npm run build

      - name: 🚀 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          # O diretório 'dist' é o padrão para projetos React com Vite.
          # Caso use Create React App (CRA), altere manualmente no repo para './build/' se necessário.
          local-dir: ./dist/
          server-dir: ./previa/teste/
          state-name: .ftp-deploy-sync-state.json
          # Garante que arquivos deletados localmente também sejam removidos no servidor
          delete: true
